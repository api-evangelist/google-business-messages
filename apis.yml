aid: google-business-messages
name: Google Business Messages API
description: >-
  The Google Business Messages API enables agents to send messages, create
  events, and manage customer satisfaction surveys within conversations. It
  allows businesses to communicate with customers directly through Google
  entry points such as Search and Maps.
type: Index
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
